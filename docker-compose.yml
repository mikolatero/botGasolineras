version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: gasbot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gasbot
      MYSQL_USER: gasbot
      MYSQL_PASSWORD: gasbot
      TZ: Europe/Madrid
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - mysql_data:/var/lib/mysql

  migrator:
    build: .
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      migrator:
        condition: service_completed_successfully
    command: ["python", "-m", "app.run_bot"]
    restart: unless-stopped

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      migrator:
        condition: service_completed_successfully
    command: ["python", "-m", "app.run_worker"]
    restart: unless-stopped

volumes:
  mysql_data:

